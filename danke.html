<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Danke – Meisterservice</title>
  <meta
    name="description"
    content="Vielen Dank für deine Anfrage bei Meisterservice."
  />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f5efe8;
      --surface: #ffffff;
      --text: #1f1b17;
      --muted: #655c53;
      --accent: #845a35;
      --accent-dark: #684523;
      --shadow: 0 16px 38px rgba(31, 27, 23, 0.07);
      --radius: 24px;
      --max: 860px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Inter", Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      display: grid;
      min-height: 100vh;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(100%, var(--max));
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 42px;
      text-align: center;
    }

    img {
      width: 180px;
      margin: 0 auto 22px;
      display: block;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    p {
      margin: 0 auto 24px;
      max-width: 620px;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.8;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 24px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Meisterservice Logo" />
    <h1>Danke für deine Anfrage</h1>
    <p>
      Deine Angaben wurden erfolgreich übermittelt. Wir prüfen dein Vorhaben
      und bereiten die Anfrage für die passende regionale Weitergabe vor.
    </p>
    <a class="btn" href="index.html">Zurück zur Startseite</a>
  </div>
</body>
</html>
